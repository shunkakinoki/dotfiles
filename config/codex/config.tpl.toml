notify = [
  "bash",
  "-lc",
  "JSON=\"$1\"; LAST_MESSAGE=$(echo \"$JSON\" | jq -r '.\"last-assistant-message\" // \"Codex task completed\"'); \"$HOME/.local/bin/notify-local\" \"Codex\" \"$LAST_MESSAGE\"",
  "notify",
]

suppress_unstable_features_warning = true
web_search = "cached"
model = "__GPT_CODEX__"
model_reasoning_effort = "xhigh"
oss_provider = "lmstudio"

[features]
ghost_commit = false
undo = false
shell_tool = true
unified_exec = true
apply_patch_freeform = true
exec_policy = true
experimental_windows_sandbox = false
elevated_windows_sandbox = false
remote_compaction = true
remote_models = true
shell_snapshot = true
child_agents_md = true
powershell_utf8 = false
enable_request_compression = false
multi_agent = true
apps = true
skills = true
steer = true
collaboration_modes = true
responses_websockets = false
personality = true

[model_providers.cliproxyapi]
name = "CLIProxyAPI"
base_url = "http://localhost:8317/v1"

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"

[profiles.qwen-local]
model = "__QWEN_LOCAL__"
model_provider = "lmstudio"
model_reasoning_effort = "minimal"
