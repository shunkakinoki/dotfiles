suppress_unstable_features_warning = true
web_search = "cached"
model = "gpt-5.6-sol"
enabled-reasoning-efforts = ["medium", "high"]
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
personality = "pragmatic"
model_verbosity = "low"
model_reasoning_summary = "concise"
notify = ["turn-ended"]
oss_provider = "lmstudio"

[features]
apply_patch_freeform = true
apply_patch_streaming_events = true
apps = true
apps_mcp_path_override = true
artifact = true
auth_elicitation = true
browser_use = true
browser_use_external = true
builtin_mcp = true
child_agents_md = true
chronicle = true
code_mode = true
code_mode_only = true
codex_git_commit = true
computer_use = true
default_mode_request_user_input = true
enable_fanout = true
enable_mcp_apps = true
enable_request_compression = true
exec_permission_approvals = true
external_migration = true
fast_mode = false
general_analytics = true
goals = true
guardian_approval = true
hooks = true
image_generation = true
in_app_browser = true
js_repl = true
js_repl_tools_only = false
memories = true
multi_agent = true
multi_agent_v2 = false
personality = true
plugin_hooks = true
plugins = true
prevent_idle_sleep = true
realtime_conversation = true
remote_compaction_v2 = false
remote_control = true
remote_plugin = true
request_permissions_tool = true
responses_websocket_response_processed = true
runtime_metrics = true
shell_snapshot = true
shell_tool = true
shell_zsh_fork = false
skill_env_var_dependency_prompt = true
skill_mcp_dependency_install = true
tool_call_mcp_elicitation = true
tool_search = true
tool_search_always_defer_mcp_tools = true
tool_suggest = true
terminal_resize_reflow = true
unavailable_dummy_tools = true
undo = true
unified_exec = true
voice_transcription = true
workspace_dependencies = true
workspace_owner_usage_nudge = true

[agents]
max_threads = 10

[model_providers.cliproxyapi]
name = "CLIProxyAPI"
base_url = "http://localhost:8317/v1"

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"

[profiles.qwen-local]
model = "qwen3.5-0.8b-optiq"
model_provider = "lmstudio"
model_reasoning_effort = "minimal"

[desktop]
# Suggestions
ambient-suggestions-enabled = true

# Appearance
appearanceTheme = "system"
appearanceLightCodeThemeId = "codex"
appearanceDarkCodeThemeId = "codex"
appearanceDiffMarkerStyle = "color"
sansFontSize = 14
codeFontSize = 12
useFontSmoothing = true
usePointerCursors = false
dock-icon-preference = "app-default"
reduced-motion-preference = "system"

# Appshots and browser
appshotDestination = "automatic"
appshotSoundEnabled = true
browser-annotation-screenshots-mode = "always"

# Files, links, and terminal
mac-menu-bar-enabled = true
open-in-target-preferences = {}
open-link-in-target-preference = "in-app-browser"
open-local-url-in-target-preference = "in-app-browser"
custom_file_handlers = {}
defaultTerminalLocation = "bottom"

# Composer and review
dictationDictionary = []
followUpQueueMode = "steer"
composerEnterBehavior = "cmdIfMultiline"
show-context-window-usage = true
reviewDelivery = "inline"
conversationDetailMode = "STEPS_COMMANDS"

# Power
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true

# Popout window
hotkey-window-projectless-default-enabled = false

# Git and worktrees
git-branch-prefix = "codex/"
git-always-force-push = true
git-create-pull-request-as-draft = true
git-pull-request-merge-method = "squash"
git-review-mode = "full"
git-worktree-root = ""
worktree-auto-cleanup-enabled = true
worktree-keep-count = 300

# Notifications
notifications-turn-mode = "always"
notifications-permissions-enabled = true
notifications-questions-enabled = true

# Floating Codex pet
avatar-overlay-mascot-width-px = 112

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true
