general {
    lock_cmd = qs -c noctalia-shell ipc call lockscreen lock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3
}

# Dim screen after 3 minutes (only on battery)
listener {
    timeout = 180
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 0 && brightnessctl -s set 10'
    on-resume = brightnessctl -r
}

# Dim screen after 10 minutes (only on AC)
listener {
    timeout = 600
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 1 && brightnessctl -s set 10'
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes (only on battery)
listener {
    timeout = 300
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 0 && loginctl lock-session'
}

# Lock screen after 15 minutes (only on AC)
listener {
    timeout = 900
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 1 && loginctl lock-session'
}

# Turn off display after 5.5 minutes (only on battery)
listener {
    timeout = 330
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 0 && hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on
}

# Turn off display after 30 minutes (only on AC)
listener {
    timeout = 1800
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 1 && hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on
}

# No suspend on AC (intentional)

# Suspend after 30 minutes (only on battery)
listener {
    timeout = 1800
    on-timeout = bash -c 'cat /sys/class/power_supply/AC*/online | grep -q 0 && systemctl suspend'
}
