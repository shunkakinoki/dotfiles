-- Conky clock widget — Dracula theme, translucent
conky.config = {
    alignment = 'top_middle',
    gap_x = 0,
    gap_y = 40,

    -- XWayland transparency on Hyprland
    own_window = true,
    own_window_type = 'override',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 140,
    own_window_colour = '282a36',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Rendering
    double_buffer = true,
    use_xft = true,
    font = 'DejaVu Sans:size=12',
    xftalpha = 0.9,

    -- Dracula colors
    default_color = 'f8f8f2',
    color1 = 'bd93f9',  -- purple
    color2 = 'ff79c6',  -- pink
    color3 = '8be9fd',  -- cyan
    color4 = '6272a4',  -- comment

    -- Layout
    minimum_width = 280,
    minimum_height = 120,
    border_inner_margin = 20,
    border_outer_margin = 0,

    -- Behavior
    update_interval = 1.0,
    cpu_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
}

conky.text = [[
${alignc}${color1}${font DejaVu Sans:bold:size=48}${time %H:%M}${font}
${alignc}${color2}${font DejaVu Sans:size=12}${time %A}${font}
${alignc}${color3}${font DejaVu Sans:size=14}${time %B %d, %Y}${font}
]]
