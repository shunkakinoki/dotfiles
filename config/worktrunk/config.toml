worktree-path = "{{ repo_path }}/.worktrees/{{ branch | sanitize }}"

[post-start]
copy = "bash -c 'created=0; [ ! -f .worktreeinclude ] && printf \".env*\\nnode_modules/\\n\" > .worktreeinclude && created=1; wt step copy-ignored; [ $created -eq 1 ] && rm -f .worktreeinclude; exit 0'"

[commit]
stage = "all"

[commit.generation]
command = "MAX_THINKING_TOKENS=0 claude -p --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

[list]
summary = true

[merge]
squash = true
commit = true
rebase = true
remove = true
verify = true
