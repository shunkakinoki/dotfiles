# =============================================================================
# Oh My Pi — Configuration
# =============================================================================
# This is the annotated configuration for config.yml.
# It shows every available configuration field with documentation.
# Copy values from here into config.yml to override defaults.
#
# Fields marked [REQUIRED] must be present in config.yml.
# All other fields are optional and fall back to harness defaults.
#
# =============================================================================
# HOW TO USE THIS FILE
# =============================================================================
# 1. Edit config.yml (your actual settings) — this file is read-only reference.
# 2. Copy any field from here into config.yml to override the default.
# 3. Run `omp config validate` to check your config.yml for errors.
# =============================================================================
# =============================================================================
# CHANGELOG TRACKING
# =============================================================================
# lastChangelogVersion
#   Track the last changelog version shown to the user.
#   Type: string (semver, e.g. "13.13.2")
#   Default: "0.0.0" (show all entries on first run)
#   Increment this value to re-display a changelog entry to the user.
#
# The explicit current settings snapshot begins below.

lastChangelogVersion: "13.13.2"
shellPath: null
extensions: []
enabledModels: []
disabledProviders: []
disabledExtensions: []

# =============================================================================
# MODEL ROLES
# =============================================================================
# Map of role name -> model identifier.
# Each role is a named model configuration you can reference in skills,
# commands, or agent definitions.
#
# Model identifier format: "<provider>/<model>"
#
# Common providers:
#   anthropic  — Claude models (claude-sonnet-4, claude-opus-4, etc.)
#   openai     — OpenAI models (gpt-5.4, gpt-4o, etc.)
#   google     — Gemini models (gemini-3-pro, gemini-3-flash, etc.)
#   codex      — OpenAI Codex (ChatGPT, gpt-5.4, etc.)
#   deepseek   — DeepSeek models
#   mistral    — Mistral models
#   groove     — Groq models
#   openrouter — OpenRouter (access to many models)
#
# Examples:
#   default: openai/gpt-5.4
#   fast:    openai/gpt-4o-mini
#   slow:    anthropic/claude-opus-4
#   cheap:   google/gemini-3-flash
modelRoles:
  # [REQUIRED] Default model — fallback for all model selections.
  default: "openai-codex/gpt-5.4"
  # Smaller / dumber model for cheap lightweight work.
  smol: "openai-codex/gpt-5.4-mini"
  # Strongest model in the suite for hard tasks.
  slow: "openai-codex/gpt-5.4"
  # Keep vision on the main default model.
  vision: "openai-codex/gpt-5.4"
  # Planning / architecture model.
  plan: "openai-codex/gpt-5.4"
  # Commit message model.
  commit: "openai/gpt-5.4-nano"
  # Fast subagent path.
  task: "openai-codex/gpt-5.3-codex-spark"

# =============================================================================
# DISPLAY
# =============================================================================
display:
  # showTokenUsage
  #   Display token count and cost estimate after each model response.
  #   Type: boolean
  #   Default: false
  #   Recommended: true for cost monitoring, false for reduced noise.
  showTokenUsage: true
  tabWidth: 3

showHardwareCursor: true
clearOnShrink: false
hideThinkingBlock: false
repeatToolDescriptions: false
collapseChangelog: false
defaultThinkingLevel: "high"

temperature: -1
topP: -1
topK: -1
minP: -1
presencePenalty: -1
repetitionPenalty: -1
serviceTier: "none"

# =============================================================================
# THEME
# =============================================================================
theme:
  # dark
  #   Dark theme variant for the terminal UI.
  #   Type: string (theme name)
  #   Default: "dark-dracula"
  #
  #   Common themes:
  #     dark-dracula   — Dracula (purple/pink accents)
  #     dark-one       — One Dark (blue/green accents)
  #     dark-gruvbox   — Gruvbox (warm retro colors)
  #     dark-catppuccin — Catppuccin Mocha
  #     dark-nord      — Nord (cool blue-grey)
  #
  #   Light theme support depends on your terminal and harness config.
  dark: "dark-dracula"
  light: "light"

symbolPreset: "unicode"
colorBlindMode: false

# =============================================================================
# STATUS LINE
# =============================================================================
statusLine:
  # preset
  #   Pre-built status line configuration.
  #   Type: string
  #   Options: default | minimal | compact | full | nerd | ascii | custom
  #   Use "custom" when defining leftSegments/rightSegments below.
  preset: "custom"
  # separator
  #   Visual separator between status line segments.
  #   Type: string
  #   Options: powerline | powerline-thin | slash | pipe | block | none | ascii
  separator: "powerline-thin"
  # showHookStatus
  #   Display hook status messages below the status line.
  #   Type: boolean
  showHookStatus: true
  # leftSegments
  #   Segments rendered on the left side of the status line.
  #   Supported IDs include: pi, model, plan_mode, path, git, pr, subagents,
  #   token_in, token_out, token_total, token_rate, cost, context_pct,
  #   context_total, time_spent, time, session, hostname, cache_read, cache_write.
  leftSegments:
    - "pi"
    - "model"
    - "path"
    - "git"
  # rightSegments
  #   Segments rendered on the right side of the status line.
  rightSegments:
    - "context_pct"
    - "cost"
    - "subagents"
    - "time_spent"
  # segmentOptions
  #   Per-segment overrides. Keep empty until a concrete override is needed.
  segmentOptions: {}

# =============================================================================
# INTERACTION MODES
# =============================================================================
# Control how the agent steers, follows up, and handles interruptions.
#
# steeringMode
#   How actively the agent guides the conversation and takes initiative.
#   Type: string
#   Options:
#     - "all"      — Full steering: agent proposes directions, asks clarifying
#                    questions, suggests next steps proactively.
#     - "minimal"  — Minimal steering: agent follows user lead, only
#                    intervenes when explicitly needed.
#     - "none"     — No steering: purely reactive, no initiative.
#   Default: "all"
steeringMode: "all"
# followUpMode
#   Whether the agent generates follow-up questions or suggestions after
#   completing a task or response.
#   Type: string
#   Options:
#     - "all"       — Always offer follow-up suggestions relevant to the task.
#     - "contextual" — Only suggest when the context clearly warrants it
#                      (e.g., after a code change, suggest running tests).
#     - "none"      — Never proactively suggest follow-ups.
#   Default: "all"
followUpMode: "all"
# interruptMode
#   How the agent handles user input while mid-task.
#   Type: string
#   Options:
#     - "immediate"  — Drop everything and respond right away. Fastest
#                       response to interruption but may leave partial state.
#     - "checkpoint"  — Finish the current logical step (e.g., finish writing
#                       a file, complete a tool call) before responding.
#     - "deferred"   — Queue the interruption, finish the full task, then
#                       respond. Use when you want atomic task completion.
#   Default: "immediate"
interruptMode: "immediate"
# doubleEscapeAction
#   Action triggered by double-Escape key press (Escape within ~500ms of
#   another Escape). This is the standard interrupt shortcut.
#   Type: string
#   Options:
#     - "none"      — Do nothing (disable double-Escape).
#     - "interrupt"  — Soft interrupt: signal the current task to stop,
#                       allow graceful cleanup.
#     - "stop"      — Hard stop: immediately terminate the current task,
#                       do not clean up.
#     - "suspend"   — Suspend the agent to background, return to idle.
#   Default: "none" (double-Escape is disabled)
doubleEscapeAction: "none"
treeFilterMode: "default"
autocompleteMaxVisible: 5

# =============================================================================
# STARTUP BEHAVIOUR
# =============================================================================
startup:
  # quiet
  #   Suppress the startup banner and welcome message.
  #   Type: boolean
  #   Default: false (show banner)
  #   Set to true for scripting, CI, or minimal-output workflows.
  quiet: true
  checkUpdate: true

completion:
  notify: "on"

ask:
  timeout: 30
  notify: "on"

stt:
  enabled: false
  language: "en"
  modelName: "base.en"

contextPromotion:
  enabled: true

# =============================================================================
# ADVANCED FIELDS (uncomment to use)
# =============================================================================
# The fields below are not set by default. Uncomment and configure as needed.

# --- Context Limits -----------------------------------------------------------
# Limits on context window and conversation length.
# context:
#   # Maximum tokens in the context window (input + output).
#   # Type: integer
#   # Default: Provider limit (e.g., 200k for GPT-5.4)
#   # Use lower values to cap cost or force more aggressive summarization.
#   maxTokens: 100000
#
#   # Maximum number of conversation turns before forcing a summary or reset.
#   # Type: integer
#   # Default: unlimited
#   maxTurns: 50

# --- Tool Policy -------------------------------------------------------------
# Restrict which tools the agent is allowed to use.
# Use this for safety, testing, or sandboxed environments.
# toolPolicy:
#   # Tools the agent is allowed to call.
#   # Type: array of tool names
#   # Examples: [read, grep, bash] | [read, write] | all
#   allowed: []
#
#   # Tools the agent is explicitly forbidden from using.
#   # Takes precedence over 'allowed'.
#   # Type: array of tool names
#   denied: []

# --- Provider Credentials -----------------------------------------------------
# API keys for model providers. It is STRONGLY recommended to set these via
# environment variables instead of in this file, to avoid accidental commit.
# env:
#   OPENAI_API_KEY: ""
#   ANTHROPIC_API_KEY: ""
#   GOOGLE_API_KEY: ""
#   DEEPSEEK_API_KEY: ""

# --- Logging -----------------------------------------------------------------
# logging:
#   # Log level: debug | info | warn | error
#   # Default: info
#   level: info
#
#   # Log file path. Supports ~/ expansion.
#   # Default: stderr only (no file)
#   file: ~/.omp/logs/agent.log
#
#   # Log file max size before rotation (bytes).
#   # Default: 10MB
#   maxSize: 10485760

# --- Retry & Timeout ---------------------------------------------------------
retry:
  enabled: true
  maxRetries: 3
  baseDelayMs: 2000

# --- Compaction --------------------------------------------------------------
compaction:
  enabled: true
  strategy: "context-full"
  thresholdPercent: -1
  thresholdTokens: -1
  handoffSaveToDisk: false
  remoteEnabled: true
  reserveTokens: 16384
  keepRecentTokens: 20000
  autoContinue: true
  remoteEndpoint: null

branchSummary:
  enabled: false
  reserveTokens: 16384

# --- Memory & Context --------------------------------------------------------
memories:
  enabled: false
  maxRolloutsPerStartup: 64
  maxRolloutAgeDays: 30
  minRolloutIdleHours: 12
  threadScanLimit: 300
  maxRawMemoriesForGlobal: 200
  stage1Concurrency: 8
  stage1LeaseSeconds: 120
  stage1RetryDelaySeconds: 120
  phase2LeaseSeconds: 180
  phase2RetryDelaySeconds: 180
  phase2HeartbeatSeconds: 30
  rolloutPayloadPercent: 0.7
  fallbackTokenLimit: 16000
  summaryInjectionTokenLimit: 5000

ttsr:
  enabled: true
  contextMode: "discard"
  interruptMode: "always"
  repeatMode: "once"
  repeatGap: 10

edit:
  mode: "hashline"
  fuzzyMatch: true
  fuzzyThreshold: 0.95
  streamingAbort: false
  blockAutoGenerated: true

readLineNumbers: false
readHashLines: true

read:
  defaultLimit: 300

grep:
  enabled: true
  contextBefore: 0
  contextAfter: 0

find:
  enabled: true

astGrep:
  enabled: true

astEdit:
  enabled: true

notebook:
  enabled: true

renderMermaid:
  enabled: false

calc:
  enabled: false

inspect_image:
  enabled: false

checkpoint:
  enabled: false

fetch:
  enabled: true

web_search:
  enabled: true

browser:
  enabled: true
  headless: true

async:
  enabled: false
  maxJobs: 100

lsp:
  enabled: true
  formatOnWrite: false
  diagnosticsOnWrite: true
  diagnosticsOnEdit: false

bashInterceptor:
  enabled: false
  simpleLs: true

python:
  toolMode: "both"
  kernelMode: "session"
  sharedGateway: true

tools:
  artifactSpillThreshold: 50
  artifactTailBytes: 20
  artifactTailLines: 500
  intentTracing: true
  maxTimeout: 0

terminal:
  showImages: true

images:
  autoResize: true
  blockImages: false

mcp:
  enableProjectConfig: true
  discoveryMode: false
  discoveryDefaultServers: []
  notifications: false
  notificationDebounceMs: 500

# --- Task Agent Overrides ---------------------------------------------------
# Override discovered agent model patterns by agent name. These names match the
# custom agents shown in the subagent dashboard.
task:
  isolation:
    mode: "none"
    merge: "patch"
    commits: "generic"
  eager: false
  maxConcurrency: 32
  maxRecursionDepth: 2
  disabledAgents: []
  agentModelOverrides:
    code-architect: "gpt-5.4"
    code-explorer: "gpt-5.3-codex-spark"
    code-reviewer: "gpt-5.4"
    code-simplifier: "gpt-5.4"
    comment-analyzer: "gpt-5.4-nano"
    pr-test-analyzer: "gpt-5.4-mini"
    silent-failure-hunter: "gpt-5.4"
    type-design-analyzer: "gpt-5.4"

# --- Agent Definitions -------------------------------------------------------
# Inline agent definitions (alternative to skill/agent files).
# agents: {}

tasks:
  todoClearDelay: 60

todo:
  enabled: true
  reminders:
    max: 3
  eager: false

skills:
  enabled: true
  enableSkillCommands: true
  enableCodexUser: true
  enableClaudeUser: true
  enableClaudeProject: true
  enablePiUser: true
  enablePiProject: true
  customDirectories: []
  ignoredSkills: []
  includeSkills: []

commands:
  enableClaudeUser: true
  enableClaudeProject: true

secrets:
  enabled: false

providers:
  webSearch: "auto"
  codeSearch: "grep"
  image: "auto"
  kimiApiFormat: "anthropic"
  openaiWebsockets: "auto"
  parallelFetch: true

exa:
  enabled: true
  enableSearch: true
  enableResearcher: false
  enableWebsets: false

commit:
  mapReduceEnabled: true
  mapReduceMinFiles: 4
  mapReduceMaxFileTokens: 50000
  mapReduceTimeoutMs: 120000
  mapReduceMaxConcurrency: 5
  changelogMaxDiffChars: 120000

thinkingBudgets:
  minimal: 1024
  low: 2048
  medium: 8192
  high: 16384
