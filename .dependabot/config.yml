version: 1

update_configs:
  - package_manager: "python"
    directory: "src/pipenv"
    update_schedule: "live"
    default_reviewers:
      - shunkakinoki

  - package_manager: "javascript"
    directory: "src/npm"
    update_schedule: "live"
    default_reviewers:
      - shunkakinoki

  - package_manager: "submodules"
    directory: "."
    update_schedule: "daily"
    default_reviewers:
      - shunkakinoki

  - package_manager: "github_actions"
    directory: "."
    update_schedule: "daily"
    default_reviewers:
      - shunkakinoki
