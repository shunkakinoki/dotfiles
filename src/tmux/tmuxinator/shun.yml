name: shun
root: ~/
windows:
  - zsh: neofetch
  - gotop: while true; do gotop; done
  - gitbatch: while true; do gitbatch; done
  - chrome:
      layout: even-vertical
      panes:
        - while true; do b; done
        - while true; do c; done
  - iftop: while true; do sudo iftop -i en0; done
  - vnstat:
      layout: tiled
      panes:
        - watch -n 3 vnstat -t -i en0
        - watch -n 3 vnstat -h -i en0
        - watch -n 3 vnstat -d -i en0
        - watch -n 3 vnstat -m -i en0
  - behind: while true; do vnstatd -n; done
