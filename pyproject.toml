[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.13"

# UV global tools - installed as isolated environments via uv tool install.
# Listed here for Renovate to track version updates.
# These conflict with each other so cannot be co-installed; use: uv tool install <package>
[dependency-groups]
tools = [
  "aider-chat>=0.86.2",
  "claude-swap>=0.8.1",
  "huggingface-hub[mcp]>=1.12.0",
  "marker-pdf>=1.10.2",
  "mempalace>=3.3.3",
  "mistral-vibe>=2.8.1",
  "nvitop>=1.6.2",
  "ruff>=0.15.12",
  "serena-agent>=1.1.2",
  "transformers>=5.6.2",
  "vllm>=0.19.1",
  "vllm-mlx>=0.2.9",
]

[tool.uv]
exclude-newer = "1 week"

[tool.uv-globals]
# Packages that require --prerelease=allow during uv tool install
prerelease = ["serena-agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I"]
